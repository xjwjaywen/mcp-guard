<!doctype html>
<html lang="zh-CN">

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}MCP-Guard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="{{ url_for('index') }}">
        <span class="brand-mark">MG</span>
        <span>MCP-Guard</span>

      <nav class="nav">
        <a href="{{ url_for('index') }}">扫描</a>
        <a href="{{ url_for('examples') }}">示例</a>
      </nav>
    </header>

    <main class="page">

  </body>
</html>
